version: 0.2

env:
  variables:
    EC2_PATH: /home/ec2-user/project

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      - yum install -y python3 openssh-clients

  pre_build:
    commands:
      - echo "Setting up SSH key..."
      - echo "$SSH_KEY" > key.pem
      - chmod 600 key.pem

  build:
    commands:
      - echo "Running Python processing..."
      - python3 process.py

      - echo "Validating output..."
      - test -f resultado.txt || (echo "resultado.txt not found" && exit 1)

  post_build:
    commands:
      - echo "Uploading to S3..."
      - aws s3 cp index.html s3://$BUCKET_NAME/index.html
      - aws s3 cp resultado.txt s3://$BUCKET_NAME/resultado.txt

      - echo "Preparing EC2..."
      - ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST "rm -rf $EC2_PATH && mkdir -p $EC2_PATH"

      - echo "Copying files..."
      - scp -i key.pem -o StrictHostKeyChecking=no -r ./* ec2-user@$EC2_HOST:$EC2_PATH/

      - echo "Running script on EC2..."
      - |
        ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST << 'EOF'
          set -e
          cd /home/ec2-user/project

          python3 process.py

          echo "EC2 output:"
          cat resultado.txt
        EOF

artifacts:
  files:
    - '**/*'